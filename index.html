<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lernwörter üben</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f1f5f9;color:#0f172a}
.wrap{max-width:1100px;margin:auto;padding:20px}
h1{text-align:center;margin-bottom:6px}
p.subtitle{text-align:center;color:#475569;margin-top:0}
.grid{display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-top:20px}
.card{background:white;border-radius:20px;padding:20px;border:1px solid #e2e8f0}
textarea,input{width:100%;border-radius:14px;border:1px solid #cbd5e1;padding:12px;font-size:1rem}
textarea{min-height:240px}
button{border:0;border-radius:14px;padding:12px 16px;font-size:1rem;background:#0f172a;color:white;cursor:pointer}
button.secondary{background:#e2e8f0;color:#0f172a}
.flex{display:flex;flex-wrap:wrap;gap:10px}
.exercise{border:1px solid #e2e8f0;border-radius:22px;padding:30px;text-align:center}
.word{font-size:3rem;font-weight:bold;margin:10px 0}
.progress{height:12px;background:#e2e8f0;border-radius:999px;margin:10px 0}
.bar{height:100%;background:#0f172a;width:0%}
.feedback{padding:14px;border-radius:12px;margin-top:10px;display:none}
.ok{background:#dcfce7;color:#166534;display:block}
.err{background:#fee2e2;color:#991b1b;display:block}
.stats{display:flex;gap:10px;margin-top:10px}
.stat{flex:1;background:#e2e8f0;border-radius:12px;padding:10px}
.hidden{display:none}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="wrap">

<h1>Lernwörter Trainer</h1>
<p class="subtitle">Browser-App für iPad, Laptop oder Beamer</p>

<div class="grid">

<div class="card">

<div class="flex" style="justify-content:space-between;align-items:center">
<h2 style="margin:0">Wortliste</h2>
<button class="secondary" id="toggleList">Liste anzeigen</button>
</div>

<div id="listContainer" class="hidden" style="margin-top:10px">
<p>Diese Liste ist bereits fest integriert. Du kannst sie optional anpassen.</p>
<textarea id="wordList"></textarea>
</div>

</div>

<div class="card">

<div class="flex" style="justify-content:space-between">
<h2>Üben</h2>
<div class="flex">
<button class="secondary" id="shuffle">Mischen</button>
<button class="secondary" id="reset">Neu</button>
</div>
</div>

<div id="progressText">0 / 0</div>
<div class="progress"><div class="bar" id="progressBar"></div></div>

<div class="flex" style="margin-bottom:10px">
<button id="modeCards">Karteikarten</button>
<button class="secondary" id="modeWrite">Hören & schreiben</button>
</div>

<div id="cards">
<div class="exercise">
<div id="cardCount"></div>
<div class="word" id="cardWord"></div>
<div class="flex" style="justify-content:center">
<button id="speakCard">Vorlesen</button>
<button class="secondary" id="toggle">Verdecken</button>
<button class="secondary" id="nextCard">Weiter</button>
</div>
</div>
</div>

<div id="write" class="hidden">
<div class="exercise" style="text-align:left">
<div id="writeCount"></div>

<div class="flex">
<button id="speakWrite">Wort anhören</button>
</div>

<input id="answer" placeholder="Wort schreiben" />

<div class="flex">
<button id="check">Prüfen</button>
<button class="secondary" id="nextWrite">Weiter</button>
</div>

<div id="feedback" class="feedback"></div>

<div class="stats">
<div class="stat">Richtig<br><b id="correct">0</b></div>
<div class="stat">Quote<br><b id="accuracy">0%</b></div>
</div>

</div>
</div>

</div>
</div>

</div>

<script>

const DEFAULT_WORDS = [
"Bäcker","Rock","Decke","Brücke","Stück","glücklich","Rücken","dreckig","schrecklich","blicken",
"Zucker","spucken","entdecken","erschrecken","stricken","entwickeln","Mücke","dick","zurück","schmecken",
"Beispiel","Papier","Tier","Lied","tief","Tiefe","gießen","Biene","Krieg","schieben",
"zielen","Zwiebel","nie","niemals","niemand","kriechen","verlieren","lieb","lieben","riechen",
"schießen","schwierig","schließlich","Mütze","Gesetz","Hitze","Spitze","Pfütze","Netz","Blitz",
"Witz","Katze","schützen","putzen","Schatz","verletzen","nützlich","besetzt","blitzen","letzter",
"zuletzt","plötzlich","schmutzig","sitzen"
];

const STORAGE_KEY = "lernwoerter_liste";
const el=id=>document.getElementById(id);

let words=[];
let order=[];
let index=0;
let correct=0;
let attempts=0;
let show=true;

function loadWords(){
let saved=localStorage.getItem(STORAGE_KEY);
if(saved){
el("wordList").value=saved;
}else{
el("wordList").value=DEFAULT_WORDS.join("\n");
}
updateWords();
}

function updateWords(){
words=el("wordList").value.split("\n").map(w=>w.trim()).filter(Boolean);
localStorage.setItem(STORAGE_KEY,el("wordList").value);
order=[...Array(words.length).keys()];
index=0;
correct=0;
attempts=0;
show=true;
render();
}

function current(){return words[order[index]]||""}

let germanVoice = null;
let isSpeaking = false;

function loadGermanVoice(){
const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
if(!voices.length) return;

germanVoice =
voices.find(v => v.lang === "de-DE" && /anna|petra|markus|yannick/i.test(v.name)) ||
voices.find(v => v.lang === "de-DE") ||
voices.find(v => v.lang && v.lang.toLowerCase().startsWith("de")) ||
null;
}

function speak(word){
if(!("speechSynthesis" in window)) return;
if(isSpeaking) return; // verhindern, dass mehrfach geklickt wird

loadGermanVoice();
let u = new SpeechSynthesisUtterance(word);
u.lang = germanVoice?.lang || "de-DE";
if(germanVoice) u.voice = germanVoice;
u.rate = 0.9;
u.pitch = 1;

isSpeaking = true;

// Buttons während des Sprechens deaktivieren
el("speakCard").disabled = true;
el("speakWrite").disabled = true;

u.onend = () => {
  isSpeaking = false;
  el("speakCard").disabled = false;
  el("speakWrite").disabled = false;
};

window.speechSynthesis.cancel();
window.speechSynthesis.speak(u);
}

if("speechSynthesis" in window){
window.speechSynthesis.onvoiceschanged = loadGermanVoice;
}

function shuffle(){
for(let i=order.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[order[i],order[j]]=[order[j],order[i]];
}
index=0;render();
}

function next(){
if(!words.length)return;
index=(index+1)%words.length;
show=true;
el("answer").value="";
feedback("");
render();
}

function feedback(text,type){
let f=el("feedback");
f.className="feedback";
if(!text){f.style.display="none";return}
f.textContent=text;
f.classList.add(type);
f.style.display="block";
}

function check(){
let w=current();
let a=el("answer").value.trim().toLowerCase();
attempts++;
if(a===w.toLowerCase()){
correct++;feedback("Richtig!","ok");
}else{
feedback("Richtig wäre: "+w,"err");
}
renderStats();
}

function renderStats(){
let q=attempts?Math.round(correct/attempts*100):0;
el("correct").textContent=correct;
el("accuracy").textContent=q+"%";
}

function render(){
let total=words.length;
let num=total?index+1:0;
let p=total?num/total*100:0;

el("progressText").textContent=num+" / "+total;
el("progressBar").style.width=p+"%";

el("cardCount").textContent=total?"Wort "+num:"Keine Wörter";
el("cardWord").textContent=total?(show?current():"••••"):"Bitte Wörter eingeben";

el("writeCount").textContent=total?"Wort "+num+" von "+total:"Keine Wörter";
renderStats();
}

// Wortliste ein/ausblenden
el("toggleList").onclick=()=>{
let box=el("listContainer");
let btn=el("toggleList");

if(box.classList.contains("hidden")){
box.classList.remove("hidden");
btn.textContent="Liste verbergen";
}else{
box.classList.add("hidden");
btn.textContent="Liste anzeigen";
}
};

// Events
el("wordList").addEventListener("input",updateWords);

el("shuffle").onclick=shuffle;
el("reset").onclick=updateWords;

el("nextCard").onclick=next;
el("nextWrite").onclick=next;

el("toggle").onclick=()=>{show=!show;render()};

el("speakCard").onclick=()=>speak(current());
el("speakWrite").onclick=()=>speak(current());

el("check").onclick=check;

el("answer").addEventListener("keydown",e=>{
if(e.key==="Enter")check();
});

el("modeCards").onclick=()=>{
el("cards").classList.remove("hidden");
el("write").classList.add("hidden");
};

el("modeWrite").onclick=()=>{
el("write").classList.remove("hidden");
el("cards").classList.add("hidden");
};

loadWords();

</script>

</body>
</html>
